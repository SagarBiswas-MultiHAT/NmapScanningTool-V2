name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Lint
        run: |
          ruff check .
          ruff format --check .
          mypy

      - name: Test
        run: pytest

      - name: Build
        run: python -m build

      - name: Dependency audit
        run: pip-audit --requirement requirements.txt --progress-spinner off
